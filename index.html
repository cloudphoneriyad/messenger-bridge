<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000, initial-scale=0.24">
    <title>Messenger Desktop</title>
    <style>
        body { background: #000; color: #0084ff; text-align: center; font-family: sans-serif; padding-top: 100px; }
    </style>
</head>
<body>
    <h2>Riyad, Enabling Desktop View...</h2>
    <script>
        // TRICK 1: Mask the platform so it looks like Windows PC
        Object.defineProperty(navigator, 'platform', { get: () => 'Win32' });
        Object.defineProperty(navigator, 'userAgent', { get: () => 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' });

        // TRICK 2: Use the Desktop-specific URL with the "Force Web" parameter
        const desktopUrl = "https://web.facebook.com/messages/?m2w&view=desktop&paipv=0";

        setTimeout(() => {
            window.location.replace(desktopUrl);
        }, 500);
    </script>
</body>
</html>
