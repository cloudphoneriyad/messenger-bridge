<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger | Maintenance</title>
    <style>
        :root {
            --bg-color: #0f172a; /* Material Dark Slate */
            --accent-glow: #00ffcc; /* Neon Tech Vibe */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            width: 240px; height: 320px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; overflow: hidden;
            box-sizing: border-box; padding: 20px;
        }

        /* Glowing Construction Icon */
        .icon-circle {
            width: 64px; height: 64px;
            background: rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            animation: pulseGlow 2s infinite;
        }

        .icon-circle svg { width: 32px; height: 32px; fill: var(--accent-glow); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        /* Typography */
        h1 {
            font-size: 18px; margin: 0 0 8px 0;
            text-transform: uppercase; letter-spacing: 1px;
        }

        p {
            font-size: 13px; color: var(--text-muted);
            margin: 0 0 25px 0; line-height: 1.5;
        }

        .highlight { color: var(--accent-glow); font-weight: bold; }

        /* Expressive Loading Bar */
        .loading-track {
            width: 160px; height: 4px;
            background: #1e293b; border-radius: 4px;
            overflow: hidden; margin-bottom: 30px;
        }

        .loading-bar {
            width: 40%; height: 100%;
            background: var(--accent-glow);
            border-radius: 4px;
            animation: slide 1.5s infinite ease-in-out alternate;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }

        /* Footer Branding */
        .branding {
            position: absolute; bottom: 15px;
            font-size: 10px; color: #475569;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="icon-circle">

    <h1>System Offline</h1>
    <p>Messenger is currently in construction with <span class="highlight">Riyad</span>.</p>

    <div class="loading-track">
        <div class="loading-bar"></div>
    </div>

    <div class="branding">Powered by <span class="highlight">Riyad Tech</span></div>

</body>
</html>
