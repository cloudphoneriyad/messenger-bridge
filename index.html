<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000, initial-scale=0.24">
    <title>Messenger Desktop Emulator</title>
    <style>
        body { background: #18191a; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #0084ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div id="status">Spoofing Desktop Environment...</div>

    <script>
        // 1. LIAR ENGINE: We spoof the screen size so FB thinks it's 1920x1080
        Object.defineProperty(window.screen, 'width', { get: () => 1920 });
        Object.defineProperty(window.screen, 'height', { get: () => 1080 });
        
        // 2. TOUCH REMOVAL: Most mobile blocks trigger if 'maxTouchPoints' > 0
        Object.defineProperty(navigator, 'maxTouchPoints', { get: () => 0 });
        Object.defineProperty(navigator, 'platform', { get: () => 'Win32' });
        Object.defineProperty(navigator, 'userAgent', { get: () => 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36' });

        // 3. THE BACKDOOR URL: Using the direct 't' (thread) path with desktop flags
        // This often bypasses the "Mobile Browser" landing page entirely
        const desktopUrl = "https://web.facebook.com/messages/t/1600773677662345";

        setTimeout(() => {
            document.getElementById('status').innerText = "Launching PC Interface...";
            window.location.replace(desktopUrl);
        }, 1000);
    </script>
</body>
</html>
