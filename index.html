<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000, initial-scale=0.24">
    <title>Messenger PC</title>
    <style>
        body { background: #000; color: #0084ff; text-align: center; font-family: sans-serif; padding-top: 100px; }
    </style>
</head>
<body>
    <h2>Booting PC Engine...</h2>
    <script>
        // TRICK: Mask the browser details so Facebook thinks it's a real Windows PC
        Object.defineProperty(navigator, 'userAgent', { get: () => 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36' });
        Object.defineProperty(navigator, 'platform', { get: () => 'Win32' });

        // URL using the 'web' subdomain and the 'm2w' (Mobile to Web) force flag
        const target = "https://web.facebook.com/messages/?m2w&view=desktop&paipv=0";

        setTimeout(() => {
            window.location.replace(target);
        }, 600);
    </script>
</body>
</html>
