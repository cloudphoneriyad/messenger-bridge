<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Messenger Gateway</title>
</head>
<body style="background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif;">
    <p>Connecting to secure gateway...</p>
    <script>
        // We use a public proxy URL as a bridge. 
        // Note: Change the URL if this specific proxy goes down.
        const proxyUrl = "https://kproxy.com/go.jsp?uri=";
        const targetUrl = "https://mbasic.facebook.com/messages/";
        
        // This encodes the Facebook link so the cloud server can't block the request
        window.location.replace(proxyUrl + encodeURIComponent(targetUrl));
    </script>
</body>
</html>
