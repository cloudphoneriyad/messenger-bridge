<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudChat Launcher</title>
    <style>
        :root {
            --bg-dark: #121212;
            --nav-bg: #1e1e1e;
            --accent-blue: #0078ff;
            --icon-white: #ffffff;
            --text-secondary: #aaaaaa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            width: 240px; height: 320px;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex; justify-content: space-around; align-items: center;
            height: 40px; background: var(--nav-bg); border-bottom: 1px solid #333;
        }

        .nav-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
        .nav-btn.active { opacity: 1; border-bottom: 2px solid var(--accent-blue); }
        .nav-btn svg { width: 20px; height: 20px; fill: white; }

        /* Content Area */
        .content-container { flex-grow: 1; overflow-y: auto; padding: 12px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Grid Layout */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .app-widget {
            display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white;
        }

        .icon-box {
            width: 58px; height: 58px;
            background: white; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            margin-bottom: 4px; overflow: hidden;
        }

        .icon-box img, .icon-box svg { width: 40px; height: 40px; }
        .bg-black { background: #000; }
        .bg-blue { background: #1877F2; }

        /* Bottom Status Bar */
        .bottom-bar {
            height: 40px; background: #000; border-top: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }

        .bar-title { font-weight: bold; font-size: 16px; text-transform: uppercase; }
        .bar-icon { width: 22px; height: 22px; fill: white; cursor: pointer; }

        /* Animations */
        @keyframes tap { 0% { transform: scale(1); } 50% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .app-widget:active .icon-box { animation: tap 0.2s ease; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-btn" onclick="switchView('categories')">
            <svg viewBox="0 0 24 24"><path d="M4 4h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 10h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 16h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4z"/></svg>
        </div>
        <div class="nav-btn active" onclick="switchView('home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-btn" onclick="switchView('pins')">
            <svg viewBox="0 0 24 24"><path d="M16 5l-8 0 0 12 8 0 0-12zm2-2l0 16-12 0 0-16 12 0z"/></svg>
        </div>
    </div>

    <div class="content-container">
        <div id="categories" class="view">
            <p style="text-align:center; color:gray;">Categories coming soon...</p>
        </div>

        <div id="home" class="view active">
            <div class="app-grid">
                <a href="https://www.instagram.com" class="app-widget">
                    <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg"></div>
                </a>
                <a href="https://www.bbc.com" class="app-widget">
                    <div class="icon-box bg-black"><span style="color:white; font-weight:bold; font-size:14px;">BBC</span></div>
                </a>
                <a href="https://www.messenger.com" class="app-widget">
                    <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg"></div>
                </a>
                
                <a href="#" class="app-widget">
                    <div class="icon-box bg-black"><span style="font-size:28px;">🌧️</span></div>
                </a>
                <a href="https://m.youtube.com" class="app-widget">
                    <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg"></div>
                </a>
                <a href="https://www.tiktok.com" class="app-widget">
                    <div class="icon-box bg-black"><img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg"></div>
                </a>
                
                <a href="https://m.facebook.com" class="app-widget">
                    <div class="icon-box bg-blue"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"></div>
                </a>
                <a href="#" class="app-widget">
                    <div class="icon-box bg-black"><span style="font-size:28px;">📻</span></div>
                </a>
                <a href="https://gemini.google.com" class="app-widget">
                    <div class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Gemini_language_model_logo.svg"></div>
                </a>
            </div>
        </div>

        <div id="pins" class="view">
            <p style="text-align:center; color:gray;">Pinned apps will appear here.</p>
        </div>
    </div>

    <div class="bottom-bar">
        <svg class="bar-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        <div class="bar-title" id="page-title">HOME</div>
        <svg class="bar-icon" viewBox="0 0 24 24" onclick="window.history.back()"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>

    <script>
        function switchView(viewId) {
            // Remove active class from all views and buttons
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Set current view and button to active
            document.getElementById(viewId).classList.add('active');
            
            // Set Page Title
            document.getElementById('page-title').innerText = viewId.toUpperCase();

            // Highlight the correct button
            const btnIndex = viewId === 'categories' ? 0 : viewId === 'home' ? 1 : 2;
            document.querySelectorAll('.nav-btn')[btnIndex].classList.add('active');
        }
    </script>
</body>
</html>
